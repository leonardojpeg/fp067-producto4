<header class="top-stripe"></header>

<header class="main-header">
  <div class="brand-block">
    <h1>EQUIPO BASKET</h1>
    <p>Plantilla oficial · Temporada 2025-26</p>
  </div>
</header>

<main class="app-layout">
  <section class="panel">
    <app-players (playerSelected)="onPlayerSelected($event)"></app-players>
  </section>

  <section class="panel">
    <app-detail
      [player]="selectedPlayer"
      (closeDetail)="clearSelection()">
    </app-detail>
  </section>

  <section class="panel">
    <app-media [player]="selectedPlayer"></app-media>
  </section>
</main>
